<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Entrar – Controle de Chaves</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto+Mono:wght@400;700;800&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">
    <main class="login-shell">

        <section class="login-brand">
            <div class="login-logo">
                🔑
            </div>

            <div>
                <span class="login-label">Central de Segurança</span>
                <h1>Controle de Chaves</h1>
                <p>
                    Acesso restrito aos operadores autorizados.
                </p>
            </div>
        </section>

        <section class="login-card">
            <div class="login-card-topo">
                <h2>Entrar no sistema</h2>
                <p>Informe a senha de acesso para continuar.</p>
            </div>

            <form id="formLogin">
                <label for="senha" class="login-campo-label">
                    Senha de acesso
                </label>

                <div class="login-input-wrap">
                    <input
                        type="password"
                        id="senha"
                        placeholder="Digite sua senha"
                        autocomplete="current-password"
                        required
                    >

                    <button
                        type="button"
                        id="btnVerSenha"
                        class="btn-ver-senha"
                        aria-label="Mostrar ou ocultar senha"
                    >
                        👁
                    </button>
                </div>

                <button type="submit" id="btnEntrar" class="btn-login">
                    Entrar
                </button>

                <div id="erroLogin" class="erro-login"></div>
            </form>

            <div class="login-rodape">
                <span class="ponto-status"></span>
                Sistema protegido por autenticação
            </div>
        </section>

    </main>

    <script>
        const form = document.getElementById('formLogin');
        const senha = document.getElementById('senha');
        const erroLogin = document.getElementById('erroLogin');
        const btnEntrar = document.getElementById('btnEntrar');
        const btnVerSenha = document.getElementById('btnVerSenha');

        btnVerSenha.addEventListener('click', () => {
            const senhaEstaOculta = senha.type === 'password';

            senha.type = senhaEstaOculta ? 'text' : 'password';
            btnVerSenha.textContent = senhaEstaOculta ? '🙈' : '👁';
        });

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            erroLogin.textContent = '';
            btnEntrar.disabled = true;
            btnEntrar.textContent = 'Entrando...';

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        senha: senha.value
                    })
                });

                const data = await resp.json();

                if (!resp.ok || !data.sucesso) {
                    erroLogin.textContent = data.erro || 'Senha inválida.';
                    senha.focus();
                    return;
                }

                window.location.href = '/';
            } catch (erro) {
                erroLogin.textContent =
                    'Erro de conexão. Verifique a internet e tente novamente.';
            } finally {
                btnEntrar.disabled = false;
                btnEntrar.textContent = 'Entrar';
            }
        });
    </script>
</body>
</html>
