<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Controle de Chaves – Central de Segurança</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;700;800&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard">

        <header class="painel-header">
            <div class="header-titulo">
                <h1>🔑 Controle de Chaves</h1>

                <div id="statusOperador" class="status-sistema ativo">
                    Operador:
                    <span id="nomeOperador">Verificando...</span>
                </div>
            </div>

            <div class="relogio" id="relogio">00:00:00</div>
        </header>

        <section class="estatisticas">
            <div class="card-stat total">
                <h3>Total de Chaves</h3>
                <p id="totalChaves">0</p>
            </div>

            <div class="card-stat em-uso">
                <h3>Em Uso</h3>
                <p id="emUso">0</p>
            </div>

            <div class="card-stat disponivel">
                <h3>Disponíveis</h3>
                <p id="disponiveis">0</p>
            </div>
        </section>

        <section class="painel-controle">
            <h3>Retirar chave</h3>

            <div class="input-group">
                <input
                    type="text"
                    id="solicitante"
                    placeholder="Nome de quem está retirando"
                    autocomplete="off"
                    required
                >

                <input
                    type="text"
                    id="setor"
                    placeholder="Setor do solicitante"
                    autocomplete="off"
                    required
                >

                <input
                    type="text"
                    id="filtroChave"
                    placeholder="Buscar chave por número ou nome"
                    autocomplete="off"
                >

                <select id="chaveDisponivel">
                    <option>Carregando...</option>
                </select>

                <button type="button" onclick="retirar()">Retirar</button>
            </div>

            <div id="msgRetirada" class="msg"></div>
        </section>

        <section class="painel-lista">
            <h3 class="titulo-lista">Chaves em uso</h3>

            <ul id="listaPendentes" class="lista-chaves">
                <li>Carregando chaves em uso...</li>
            </ul>

            <div id="msgDevolucao" class="msg"></div>
        </section>

        <section class="painel-historico">
            <div class="historico-topo">
                <div>
                    <h3>Últimas movimentações</h3>
                    <p>Retiradas e devoluções recentes</p>
                </div>
            </div>

            <ul id="listaHistorico" class="lista-historico">
                <li class="item-vazio">Carregando histórico...</li>
            </ul>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
